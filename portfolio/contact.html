 <!-- Contact form -->
 
 <section id="contactForm" class="contForm">
    <h3>Contact Me</h3>
    <form onsubmit="" method="post" class="contactForm"> 
      
        <input type="text" id="userName" name="userName" placeholder="Enter your Name" required/> 
        <br />
        
        <input type="email" id="userEmail" name="userEmail" placeholder="name@email.com" />
        <br />

        <textarea rows="10" cols="30" id="message" placeholder="Enter your message here..." class="textColor"></textarea>
<br />
        <input type="radio" name="connectMe" value="Phone"><label><b>Connect via Phone</b></label>
        <br />
        <input type="radio" name="connectMe" value="Email"><label><b>Connect via Email</b></label>
<br />
        <input type="submit" class="btn"/>
    </form>
